<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>โอเค โมบาย | ร้านมือถือ</title>
    <meta name="description" content="โอเค โมบาย - มือถือมือสอง/ใหม่ ราคาเฟรนด์ลี่ ส่งไว ของแท้ชัวร์"/>
    <meta property="og:title" content="โอเค โมบาย | ร้านมือถือ"/>
    <meta property="og:description" content="มือถือมือสอง/ใหม่ ราคาเฟรนด์ลี่ ส่งไว ของแท้ชัวร์"/>
    <meta property="og:type" content="website"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg: #0e0a1a;
            --bg-soft: #161025;
            --card: #1b1430;
            --line: #2c2347;
            --ink: #f3f0fb;
            --muted: #a89fc4;
            --acid: #c8ff4d;
            --pink: #ff4fd8;
            --blue: #4fd8ff;
        }

        * { font-family: 'Prompt', sans-serif; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }

        body { background: var(--bg); color: var(--ink); }

        .grad-text {
            background: linear-gradient(90deg, var(--blue), var(--pink) 50%, var(--acid));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .noise-bg {
            background-image:
                radial-gradient(circle at 15% 20%, rgba(79,216,255,0.18), transparent 40%),
                radial-gradient(circle at 85% 0%, rgba(255,79,216,0.18), transparent 45%),
                radial-gradient(circle at 50% 100%, rgba(200,255,77,0.10), transparent 50%);
        }

        .chip {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.03);
        }
        .chip-active {
            border-color: var(--pink) !important;
            background: rgba(255,79,216,0.12) !important;
            color: var(--pink);
        }

        .btn-primary {
            background: var(--acid);
            color: #0e0a1a;
            font-weight: 700;
            box-shadow: 0 0 0 0 rgba(200,255,77,0);
            transition: box-shadow .2s ease, transform .2s ease;
        }
        .btn-primary:hover { box-shadow: 0 0 24px 2px rgba(200,255,77,0.45); transform: translateY(-1px); }
        .btn-primary:disabled {
            background: #3a3454; color: var(--muted); box-shadow: none; cursor: not-allowed; transform: none;
        }

        .btn-ghost {
            border: 1px solid var(--line);
            color: var(--ink);
            background: rgba(255,255,255,0.02);
            transition: border-color .2s ease, background .2s ease;
        }
        .btn-ghost:hover { border-color: var(--pink); background: rgba(255,79,216,0.08); }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
        }
        .card:hover {
            transform: translateY(-6px) rotate(-0.3deg);
            border-color: rgba(255,79,216,0.5);
            box-shadow: 0 20px 50px -20px rgba(255,79,216,0.35);
        }
        .card.is-soldout:hover { transform: none; border-color: var(--line); box-shadow: none; }
        .card.is-soldout img { filter: grayscale(0.6) brightness(0.6); }

        .price-tag {
            background: linear-gradient(90deg, var(--acid), var(--blue));
            color: #0e0a1a;
        }

        .badge-new { background: var(--blue); color: #0e0a1a; }
        .badge-sale { background: var(--pink); color: #fff; }
        .badge-hot { background: var(--acid); color: #0e0a1a; }
        .badge-soldout { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid rgba(255,255,255,0.2); }

        input::placeholder { color: var(--muted); }

        .skeleton {
            background: linear-gradient(90deg, #1b1430 0px, #241b3d 40px, #1b1430 80px);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }

        @media (prefers-reduced-motion: reduce) {
            .card, .skeleton, .btn-primary, .btn-ghost { transition: none; animation: none; }
        }

        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

        .scroll-x { -ms-overflow-style: none; scrollbar-width: none; }
        .scroll-x::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen noise-bg">

    <!-- Header -->
    <header class="sticky top-0 z-20 backdrop-blur-md bg-[#0e0a1a]/80 border-b border-[var(--line)]">
        <div class="max-w-6xl mx-auto px-5 py-5 flex items-center justify-between gap-4">
            <div>
                <h1 class="font-display text-2xl sm:text-3xl font-bold tracking-tight">
                    <span class="grad-text">โอเค โมบาย</span>
                </h1>
                <p class="text-[var(--muted)] text-xs sm:text-sm mt-0.5">มือถือมือสอง ประกัน 3 เดือน ✦ของแท้ชัวร์</p>
            </div>
            <div class="hidden sm:flex items-center gap-2 shrink-0">
                <a href="warranty.html" class="btn-ghost rounded-full px-4 py-2 text-sm font-medium">เช็คประกัน</a>
                <a href="index.html" class="btn-ghost rounded-full px-4 py-2 text-sm font-medium">หน้าหลัก</a>
            </div>
        </div>
        <div class="sm:hidden flex gap-2 px-5 pb-4">
            <a href="warranty.html" class="btn-ghost rounded-full px-4 py-2 text-xs font-medium flex-1 text-center">เช็คประกัน</a>
            <a href="index.html" class="btn-ghost rounded-full px-4 py-2 text-xs font-medium flex-1 text-center">หน้าหลัก</a>
        </div>
    </header>

    <!-- Hero strip -->
    <div class="max-w-6xl mx-auto px-5 pt-8 pb-2">
        <div class="flex flex-wrap items-end justify-between gap-4">
            <h2 class="font-display text-3xl sm:text-4xl font-bold leading-tight">
                เลือกเครื่อง<br class="sm:hidden"/> <span class="grad-text">ที่ใช่</span> สำหรับคุณ
            </h2>
            <span id="result-count" class="chip rounded-full px-4 py-1.5 text-xs text-[var(--muted)] font-medium"></span>
        </div>
    </div>

    <!-- Search / Sort -->
    <div class="max-w-6xl mx-auto px-5 pt-5">
        <div class="flex flex-col md:flex-row gap-3">
            <div class="relative w-full md:w-2/3">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--muted)]">⌕</span>
                <input type="text" id="product-search" placeholder="ค้นหา iPhone, Samsung, Xiaomi..."
                       class="w-full pl-11 pr-4 py-3.5 rounded-2xl chip text-[var(--ink)] text-base focus:outline-none focus:border-[var(--pink)] focus:ring-1 focus:ring-[var(--pink)] transition">
            </div>
            <select id="product-sort"
                    class="w-full md:w-1/3 px-4 py-3.5 rounded-2xl chip text-[var(--ink)] bg-[var(--bg-soft)] text-base cursor-pointer focus:outline-none focus:ring-1 focus:ring-[var(--blue)] transition">
                <option value="default">เรียงลำดับสินค้า</option>
                <option value="price-asc">ราคา น้อย → มาก</option>
                <option value="price-desc">ราคา มาก → น้อย</option>
            </select>
        </div>
    </div>

    <!-- Brand filter chips -->
    <div class="max-w-6xl mx-auto px-5 py-4">
        <div id="brand-filters" class="flex gap-2 overflow-x-auto scroll-x pb-1"></div>
    </div>

    <!-- Price range chips -->
    <div class="max-w-6xl mx-auto px-5 pb-5">
        <div id="price-filters" class="flex gap-2 overflow-x-auto scroll-x pb-1">
            <button data-min="0" data-max="Infinity" class="price-chip chip-active chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">ทั้งหมด</button>
            <button data-min="0" data-max="5000" class="price-chip chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">ต่ำกว่า 5,000</button>
            <button data-min="5000" data-max="10000" class="price-chip chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">5,000–10,000</button>
            <button data-min="10000" data-max="20000" class="price-chip chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">10,000–20,000</button>
            <button data-min="20000" data-max="Infinity" class="price-chip chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">สูงกว่า 20,000</button>
        </div>
    </div>

    <!-- Product Grid -->
    <div class="max-w-6xl mx-auto px-5 pb-20">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-[var(--line)] text-center py-8 text-[var(--muted)] text-sm">
        © 2025 OK-MOBILE Shop Online
    </footer>

    <script type="module">
        let allProducts = [];
        let activeBrand = 'all';
        let activePriceMin = 0;
        let activePriceMax = Infinity;

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR3Ks0x16haRC2E60V7UzcEYGul-goV234Uenpln-wtFCtFgkoxUfTeGlBnSEZr65MisugNJtR1AvQF/pub?gid=715824064&output=csv';
        const CACHE_KEY = 'okmobile_products_cache_v1';
        const CACHE_TTL_MS = 5 * 60 * 1000; // 5 minutes

        const grid = document.getElementById('product-grid');
        const searchInput = document.getElementById('product-search');
        const sortInput = document.getElementById('product-sort');
        const resultCount = document.getElementById('result-count');
        const brandFilters = document.getElementById('brand-filters');
        const priceFilters = document.getElementById('price-filters');

        const renderSkeleton = (count = 6) => {
            grid.innerHTML = Array.from({ length: count }).map(() => `
                <div class="card rounded-3xl p-4">
                    <div class="skeleton h-44 rounded-2xl mb-4"></div>
                    <div class="skeleton h-5 w-3/4 rounded mb-2"></div>
                    <div class="skeleton h-7 w-1/2 rounded mb-4"></div>
                    <div class="skeleton h-10 w-full rounded-full mb-2"></div>
                    <div class="skeleton h-10 w-full rounded-full"></div>
                </div>
            `).join('');
        };
        renderSkeleton();

        const formatPrice = (price) => {
            const n = Number(price);
            return Number.isFinite(n) ? n.toLocaleString('th-TH') : '0';
        };

        const debounce = (fn, wait = 250) => {
            let t;
            return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
        };

        const isSoldOut = (stock) => {
            const s = (stock || '').trim();
            return s === 'หมด';
        };

        const tagBadge = (tag) => {
            const t = (tag || '').trim();
            if (t === 'ใหม่') return `<span class="badge-new text-[11px] font-bold px-2.5 py-1 rounded-full">ใหม่</span>`;
            if (t === 'ลดราคา') return `<span class="badge-sale text-[11px] font-bold px-2.5 py-1 rounded-full">ลดราคา</span>`;
            if (t === 'ขายดี') return `<span class="badge-hot text-[11px] font-bold px-2.5 py-1 rounded-full">ขายดี</span>`;
            return '';
        };

        const buildBrandFilters = () => {
            const brands = Array.from(new Set(
                allProducts.map(p => p.brand?.trim()).filter(Boolean)
            )).sort();

            const allChip = `<button data-brand="all" class="brand-chip chip-active chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">ทุกแบรนด์</button>`;
            const chips = brands.map(b => `<button data-brand="${b}" class="brand-chip chip rounded-full px-4 py-1.5 text-xs font-medium whitespace-nowrap">${b}</button>`).join('');

            brandFilters.innerHTML = brands.length ? (allChip + chips) : '';

            brandFilters.querySelectorAll('.brand-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeBrand = btn.dataset.brand;
                    brandFilters.querySelectorAll('.brand-chip').forEach(b => b.classList.remove('chip-active'));
                    btn.classList.add('chip-active');
                    filterAndSortProducts();
                });
            });
        };

        priceFilters.querySelectorAll('.price-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                activePriceMin = Number(btn.dataset.min);
                activePriceMax = btn.dataset.max === 'Infinity' ? Infinity : Number(btn.dataset.max);
                priceFilters.querySelectorAll('.price-chip').forEach(b => b.classList.remove('chip-active'));
                btn.classList.add('chip-active');
                filterAndSortProducts();
            });
        });

        const renderProducts = (products) => {
            grid.innerHTML = '';
            resultCount.textContent = products.length ? `${products.length} รายการ` : '';

            if (products.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <p class="text-2xl font-display font-bold grad-text">ไม่เจอเครื่องที่ค้นหา 🥲</p>
                        <p class="text-[var(--muted)] mt-2">ลองพิมพ์คำอื่น หรือล้างตัวกรองดูใหม่</p>
                    </div>`;
                return;
            }

            const frag = document.createDocumentFragment();

            products.forEach((item) => {
                const name = item.name?.trim() || 'ไม่มีชื่อสินค้า';
                const price = item.price?.trim() || '0';
                const image = item.image?.trim() || 'https://placehold.co/400x300/1b1430/c8ff4d?text=NO+IMAGE';
                const facebook = item.facebook?.trim() || 'https://www.facebook.com/profile.php?id=61566120762780';
                const buyHref = 'https://www.facebook.com/profile.php?id=61566120762780';
                const soldOut = isSoldOut(item.stock);
                const badge = tagBadge(item.tag);

                const card = document.createElement('div');
                card.className = `card rounded-3xl p-4 relative ${soldOut ? 'is-soldout' : ''}`;

                card.innerHTML = `
                    <div class="h-44 mb-4 overflow-hidden rounded-2xl bg-[var(--bg-soft)] relative">
                        ${badge ? `<div class="absolute top-2 left-2 z-10">${badge}</div>` : ''}
                        ${soldOut ? `<div class="absolute top-2 right-2 z-10 badge-soldout text-[11px] font-bold px-2.5 py-1 rounded-full">สินค้าหมด</div>` : ''}
                        <img src="${image}" alt="รูปภาพของ ${name}"
                            class="w-full h-full object-cover"
                            loading="lazy"
                            onerror="this.src='https://placehold.co/400x300/1b1430/c8ff4d?text=NO+IMAGE'">
                    </div>
                    <h3 class="font-display text-lg font-bold mb-2 truncate" title="${name}">${name}</h3>
                    <div class="inline-flex items-center price-tag rounded-full px-3 py-1 mb-4">
                        <span class="text-xs font-bold mr-1">฿</span>
                        <span class="font-display text-lg font-bold">${formatPrice(price)}</span>
                    </div>
                    <div class="flex flex-col gap-2">
                        <a href="${facebook}" target="_blank" rel="noopener noreferrer"
                            class="btn-ghost w-full text-center rounded-full px-4 py-2.5 text-sm font-semibold">
                            ดูรายละเอียด
                        </a>
                        ${soldOut
                            ? `<button disabled class="btn-primary w-full text-center rounded-full px-4 py-2.5 text-sm" disabled>สินค้าหมด</button>`
                            : `<a href="${buyHref}" target="_blank" rel="noopener noreferrer" class="btn-primary w-full text-center rounded-full px-4 py-2.5 text-sm">สั่งซื้อเลย →</a>`
                        }
                    </div>
                `;
                frag.appendChild(card);
            });

            grid.appendChild(frag);
        };

        const filterAndSortProducts = () => {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const sortMethod = sortInput.value;

            let filtered = allProducts.filter(p => (p.name?.trim()?.toLowerCase() || '').includes(searchTerm));

            if (activeBrand !== 'all') {
                filtered = filtered.filter(p => (p.brand?.trim() || '') === activeBrand);
            }

            filtered = filtered.filter(p => {
                const n = parseFloat(p.price) || 0;
                return n >= activePriceMin && n <= activePriceMax;
            });

            let sorted = [...filtered];
            if (sortMethod === 'price-asc') sorted.sort((a, b) => (parseFloat(a.price) || 0) - (parseFloat(b.price) || 0));
            else if (sortMethod === 'price-desc') sorted.sort((a, b) => (parseFloat(b.price) || 0) - (parseFloat(a.price) || 0));

            // push sold-out items to the end regardless of sort
            sorted.sort((a, b) => (isSoldOut(a.stock) ? 1 : 0) - (isSoldOut(b.stock) ? 1 : 0));

            renderProducts(sorted);
        };

        const debouncedFilter = debounce(filterAndSortProducts, 250);

        const processResults = (data) => {
            allProducts = data
                .filter(item => item.name && item.price)
                .map(item => ({ ...item, price: item.price ? String(item.price).replace(/,/g, '') : '0' }));

            buildBrandFilters();
            filterAndSortProducts();

            searchInput.addEventListener('input', debouncedFilter);
            sortInput.addEventListener('change', filterAndSortProducts);
        };

        // Try cache first for instant render, then refresh in background
        let cacheUsed = false;
        try {
            const cachedRaw = sessionStorage.getItem(CACHE_KEY);
            if (cachedRaw) {
                const cached = JSON.parse(cachedRaw);
                if (cached.ts && (Date.now() - cached.ts) < CACHE_TTL_MS && Array.isArray(cached.data)) {
                    processResults(cached.data);
                    cacheUsed = true;
                }
            }
        } catch (e) {
            console.warn('cache read failed', e);
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                processResults(results.data);
                try {
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: results.data }));
                } catch (e) {
                    console.warn('cache write failed', e);
                }
            },
            error: function (err) {
                console.error('ไม่สามารถโหลดสินค้า:', err);
                if (!cacheUsed) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <p class="text-xl font-display font-bold text-[var(--pink)]">โหลดข้อมูลสินค้าไม่สำเร็จ</p>
                            <p class="text-[var(--muted)] mt-2">กรุณาลองโหลดหน้านี้ใหม่อีกครั้ง</p>
                        </div>`;
                }
            }
        });
    </script>

</body>
</html>
